<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球汇率实时监控</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-globe-americas"></i>
                </div>
                <div class="logo-text">
                    <h1>GlobalFX</h1>
                    <span>实时汇率监控平台</span>
                </div>
            </div>
            <div class="header-right">
                <div class="base-currency-selector">
                    <label>基准货币</label>
                    <select id="baseCurrency">
                        <option value="USD">🇺🇸 USD 美元</option>
                        <option value="EUR">🇪🇺 EUR 欧元</option>
                        <option value="GBP">🇬🇧 GBP 英镑</option>
                        <option value="JPY">🇯🇵 JPY 日元</option>
                        <option value="CNY">🇨🇳 CNY 人民币</option>
                        <option value="AUD">🇦🇺 AUD 澳元</option>
                        <option value="CAD">🇨🇦 CAD 加元</option>
                        <option value="CHF">🇨🇭 CHF 瑞士法郎</option>
                    </select>
                </div>
                <div class="status-indicator">
                    <div class="pulse-dot"></div>
                    <span id="statusText">实时连接中</span>
                </div>
                <div class="last-update">
                    <i class="fas fa-clock"></i>
                    <span id="lastUpdate">--:--:--</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 概览统计卡片 -->
        <section class="stats-overview">
            <div class="stat-card glass-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">监控货币</span>
                    <span class="stat-value" id="totalCurrencies">0</span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                    <i class="fas fa-arrow-trend-up"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">上涨货币</span>
                    <span class="stat-value" id="risingCount" style="color: #00d2a0;">0</span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
                    <i class="fas fa-arrow-trend-down"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">下跌货币</span>
                    <span class="stat-value" id="fallingCount" style="color: #ff6b6b;">0</span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);">
                    <i class="fas fa-exchange-alt"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">更新次数</span>
                    <span class="stat-value" id="updateCount">0</span>
                </div>
            </div>
        </section>

        <!-- 图表区域 -->
        <section class="charts-section">
            <!-- 主图表 -->
            <div class="chart-container glass-card main-chart">
                <div class="chart-header">
                    <div class="chart-title">
                        <h2><i class="fas fa-chart-line"></i> 汇率走势图</h2>
                        <p>实时追踪主要货币汇率变化</p>
                    </div>
                    <div class="chart-controls">
                        <div class="currency-toggles" id="currencyToggles">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <!-- 副图表行 -->
            <div class="charts-row">
                <!-- 柱状图 -->
                <div class="chart-container glass-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <h2><i class="fas fa-chart-bar"></i> 当前汇率对比</h2>
                            <p>各货币相对基准货币的比值</p>
                        </div>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                <!-- 雷达图 -->
                <div class="chart-container glass-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <h2><i class="fas fa-chart-pie"></i> 波动率雷达</h2>
                            <p>各货币价格波动强度</p>
                        </div>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- 货币汇率卡片网格 -->
        <section class="currencies-section">
            <div class="section-header">
                <h2><i class="fas fa-money-bill-wave"></i> 实时汇率面板</h2>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索货币...">
                </div>
            </div>
            <div class="currencies-grid" id="currenciesGrid">
                <!-- 动态生成 -->
            </div>
        </section>

        <!-- 汇率转换器 -->
        <section class="converter-section glass-card">
            <h2><i class="fas fa-calculator"></i> 汇率转换器</h2>
            <div class="converter-body">
                <div class="converter-input-group">
                    <select id="fromCurrency"></select>
                    <input type="number" id="fromAmount" value="1" min="0" step="0.01">
                </div>
                <button class="swap-btn" id="swapBtn">
                    <i class="fas fa-exchange-alt"></i>
                </button>
                <div class="converter-input-group">
                    <select id="toCurrency"></select>
                    <input type="number" id="toAmount" readonly>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <p>© 2024 GlobalFX 实时汇率监控平台 | 数据来源: Exchange Rate API</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
